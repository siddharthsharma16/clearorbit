<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Marketing Agency - Coming Soon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #000000;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Layout components */
        .main-container {
            position: relative;
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            background-image: url('../assets/images/img_background.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        .header-section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 16px 26px;
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            z-index: 10;
        }
        
        .logo {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }
        
        .content-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 32px;
            max-width: 100%;
            z-index: 5;
        }
        
        /* Typography */
        .hero-title {
            font-size: 24px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            line-height: 1.3;
            text-align: center;
            color: #ffffff;
            margin-bottom: 8px;
            max-width: 100%;
        }
        
        .hero-description {
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            font-weight: 400;
            line-height: 1.5;
            text-align: center;
            color: #ffffff;
            max-width: 100%;
            opacity: 0.9;
        }
        
        /* Responsive media queries */
        @media (min-width: 640px) {
            .logo {
                width: 60px;
                height: 60px;
            }
            
            .hero-title {
                font-size: 32px;
                line-height: 1.4;
            }
            
            .hero-description {
                font-size: 15px;
                line-height: 1.6;
            }
            
            .content-section {
                padding: 0 48px;
            }
        }
        
        @media (min-width: 768px) {
            .header-section {
                padding: 16px 40px;
            }
            
            .logo {
                width: 70px;
                height: 70px;
            }
            
            .hero-title {
                font-size: 38px;
                line-height: 1.5;
            }
            
            .hero-description {
                font-size: 16px;
                line-height: 1.6;
                max-width: 80%;
            }
            
            .content-section {
                padding: 0 56px;
                gap: 12px;
            }
        }
        
        @media (min-width: 1024px) {
            .logo {
                width: 84px;
                height: 84px;
            }
            
            .hero-title {
                font-size: 48px;
                line-height: 72px;
            }
            
            .hero-description {
                font-size: 16px;
                line-height: 24px;
                max-width: 46%;
            }
            
            .content-section {
                padding: 0 56px;
                gap: 8px;
            }
        }
        
        @media (min-width: 1280px) {
            .main-container {
                max-width: 1440px;
                margin: 0 auto;
            }
        }
        
        /* Interactive states */
        .logo:hover {
            transform: scale(1.05);
            transition: transform 0.3s ease-in-out;
        }
        
        .hero-title {
            animation: fadeInUp 1s ease-out;
        }
        
        .hero-description {
            animation: fadeInUp 1.2s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
<script type="module" src="https://static.rocket.new/rocket-web.js?_cfg=https%3A%2F%2Fsidsappl1016back.builtwithrocket.new&_be=https%3A%2F%2Fapplication.rocket.new&_v=0.1.8"></script>
</head>
<body>
    <div class="main-container">
        <div class="header-section">
            <img src="../assets/images/img_logo.png" alt="Company Logo" class="logo" />
        </div>
        
        <div class="content-section">
            <h1 class="hero-title">"Something Powerful is Coming"</h1>
            <p class="hero-description">"Our next-gen AI-powered digital marketing agency is almost here. Stay tuned for a smarter way to grow your brand."</p>
        </div>
    </div>
</body>
</html>
